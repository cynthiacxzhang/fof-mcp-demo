<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow of Funds</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230A0A0A'/><g stroke='white' stroke-width='2.2' stroke-linecap='round' fill='none'><path d='M7 16h6M19 16h6M16 7v6M16 19v6'/><circle cx='16' cy='16' r='2' fill='white' stroke='none'/></g></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #F5F0E8;
      --surface:      #FFFFFF;
      --surface-2:    #EDE9DF;
      --border:       #D8D2C8;
      --text:         #0A0A0A;
      --text-muted:   #7A7470;
      --text-inverse: #FFFFFF;
      --tool-bg:      #F9F6F1;
      --tool-border:  #C8C2B8;
      --sans:         'Space Grotesk', sans-serif;
      --mono:         'DM Mono', monospace;
      --radius:       10px;
      --radius-sm:    6px;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────── */

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      gap: 16px;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      background: var(--text);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-mark svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-inverse);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .sidebar-desc {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .sidebar-stats {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 12px;
    }

    .stat-label { color: var(--text-muted); }
    .stat-value { font-weight: 500; font-family: var(--mono); font-size: 11.5px; }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
    }

    .new-chat-btn {
      flex-shrink: 0;
      padding: 9px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .new-chat-btn:hover {
      background: var(--surface-2);
      border-color: var(--tool-border);
    }

    /* ── Conversation history ────────────────────────── */

    .history-section {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .history-label {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 2px;
      margin-bottom: 2px;
      flex-shrink: 0;
    }

    .history-item {
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      font-size: 12.5px;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.12s;
      background: transparent;
      border: none;
      text-align: left;
      font-family: var(--sans);
      width: 100%;
      flex-shrink: 0;
    }

    .history-item:hover  { background: var(--surface-2); }
    .history-item.active { background: var(--surface-2); font-weight: 500; }

    /* ── Main ────────────────────────────────────────── */

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scroll-behavior: smooth;
    }

    .messages-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Starter prompts ─────────────────────────────── */

    .starters {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-top: 60px;
    }

    .starters h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .starters p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .starter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .starter-card {
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font-family: var(--sans);
      line-height: 1.45;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .starter-card:hover {
      border-color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .starter-card .starter-icon {
      font-size: 16px;
      margin-bottom: 6px;
      display: block;
    }

    /* ── Messages ────────────────────────────────────── */

    .message { display: flex; flex-direction: column; gap: 4px; }

    .message-role {
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .message.user .message-role { text-align: right; }

    .message-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message.user .message-body { align-items: flex-end; }

    .user-bubble {
      background: var(--text);
      color: var(--text-inverse);
      padding: 12px 16px;
      border-radius: 14px 14px 4px 14px;
      font-size: 14.5px;
      line-height: 1.55;
      max-width: 88%;
      white-space: pre-wrap;
    }

    .assistant-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 100%;
    }

    .assistant-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
    }

    .assistant-text:empty { display: none; }

    .assistant-text code {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--surface-2);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .assistant-text strong { font-weight: 600; }

    /* ── Tool cards ──────────────────────────────────── */

    .tool-card {
      border: 1px solid var(--tool-border);
      border-radius: var(--radius);
      background: var(--tool-bg);
      overflow: hidden;
      font-size: 13px;
    }

    .tool-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      gap: 8px;
    }

    .tool-header:hover { background: var(--surface-2); }

    .tool-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      background: var(--text);
      color: var(--text-inverse);
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.01em;
    }

    .tool-status {
      font-size: 12px;
      color: var(--text-muted);
    }

    .tool-toggle {
      font-size: 12px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .tool-card.open .tool-toggle { transform: rotate(180deg); }

    .tool-body {
      display: none;
      border-top: 1px solid var(--tool-border);
    }

    .tool-card.open .tool-body { display: block; }

    .tool-section {
      padding: 12px 14px;
    }

    .tool-section + .tool-section {
      border-top: 1px solid var(--tool-border);
    }

    .tool-section-label {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .tool-code {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 280px;
      overflow-y: auto;
    }

    /* Pulsing dot for loading tool */
    .tool-loading {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .tool-loading span {
      width: 5px;
      height: 5px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .tool-loading span:nth-child(2) { animation-delay: 0.2s; }
    .tool-loading span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Input area ──────────────────────────────────── */

    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
    }

    .input-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 10px 16px;
      transition: border-color 0.15s;
    }

    .input-wrapper:focus-within { border-color: var(--text); }

    #input {
      flex: 1;
      font-family: var(--sans);
      font-size: 14.5px;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      line-height: 1.5;
      max-height: 180px;
      min-height: 24px;
    }

    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      background: var(--text);
      color: var(--text-inverse);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }

    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #send-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .input-hint {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-left: 2px;
    }

    /* ── Scrollbar ───────────────────────────────────── */

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 16 16">
          <path d="M2 8h5M9 8h5M8 2v5M8 9v5" />
          <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none" />
        </svg>
      </div>
      <span class="brand-name">flow-of-funds</span>
    </div>

    <p class="sidebar-desc">
      MCP server demo for personal banking transaction analysis. Powered by Claude + DuckDB.
    </p>

    <div class="sidebar-divider"></div>

    <div class="sidebar-stats">
      <div class="stat">
        <span class="stat-label">Tables</span>
        <span class="stat-value">4</span>
      </div>
      <div class="stat">
        <span class="stat-label">Transactions</span>
        <span class="stat-value">636</span>
      </div>
      <div class="stat">
        <span class="stat-label">Accounts</span>
        <span class="stat-value">30</span>
      </div>
      <div class="stat">
        <span class="stat-label">Period</span>
        <span class="stat-value">Q4 2025</span>
      </div>
      <div class="stat">
        <span class="stat-label">Data</span>
        <span class="stat-value">synthetic</span>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="history-section" id="history-list">
      <div class="history-label">Recent</div>
    </div>

    <button class="new-chat-btn" onclick="newChat()">New conversation</button>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="messages" id="messages">
      <div class="messages-inner" id="messages-inner">

        <!-- Starter prompts -->
        <div class="starters" id="starters">
          <h2>Flow-of-Funds Analysis</h2>
          <p>Ask anything about the synthetic Q4 2025 banking data.</p>
          <div class="starter-grid">
            <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="What tables are available and what do they contain?">
              <span class="starter-icon">🗂</span>
              What tables are available and what do they contain?
            </button>
            <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="Give me a full Q4 2025 flow-of-funds summary broken down by segment.">
              <span class="starter-icon">📊</span>
              Give me a Q4 2025 flow-of-funds summary by segment.
            </button>
            <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="Which external banks received the most outflow transfers in Q4? Include return rates.">
              <span class="starter-icon">🏦</span>
              Which external banks received the most outflow transfers?
            </button>
            <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="Show me the weekly net flow trend for RETAIL accounts from October through December 2025.">
              <span class="starter-icon">📈</span>
              Weekly net flow trend for RETAIL accounts.
            </button>
            <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="What Spark pipeline produces the daily_aggregates table? Show me the lineage.">
              <span class="starter-icon">⚙️</span>
              What pipeline produces the daily_aggregates table?
            </button>
            <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="Write a query showing the top 5 accounts by total debit volume in November 2025.">
              <span class="starter-icon">💳</span>
              Top accounts by debit volume in November 2025.
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-inner">
        <div class="input-wrapper">
          <textarea id="input" rows="1" placeholder="Ask about transactions, flows, OFI transfers…"></textarea>
          <button id="send-btn" onclick="handleSend()">
            <svg viewBox="0 0 16 16"><line x1="8" y1="13" x2="8" y2="3"/><polyline points="4 7 8 3 12 7"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </main>

</div>

<script>
  // ── State ────────────────────────────────────────────────────────────────

  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }

  let sessionId = getCookie('session_id') || crypto.randomUUID();
  let isLoading = false;

  // Current assistant message elements
  let assistantContent = null;  // .assistant-content div
  let currentTextEl    = null;  // current .assistant-text span
  let toolCards        = {};    // tool_id -> card element

  // ── Helpers ──────────────────────────────────────────────────────────────

  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  function scrollBottom() {
    const el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
  }

  function setLoading(val) {
    isLoading = val;
    document.getElementById('send-btn').disabled = val;
    document.getElementById('input').disabled = val;
  }

  function hideStarters() {
    const s = document.getElementById('starters');
    if (s) s.remove();
  }

  // ── Message rendering ────────────────────────────────────────────────────

  function addUserMessage(text) {
    const inner = document.getElementById('messages-inner');
    const msg = document.createElement('div');
    msg.className = 'message user';
    msg.innerHTML = `
      <div class="message-role">You</div>
      <div class="message-body">
        <div class="user-bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>`;
    inner.appendChild(msg);
    scrollBottom();
  }

  function addAssistantMessage() {
    const inner = document.getElementById('messages-inner');
    const msg = document.createElement('div');
    msg.className = 'message assistant';

    const content = document.createElement('div');
    content.className = 'assistant-content';
    msg.innerHTML = `<div class="message-role">Assistant</div>`;
    msg.appendChild(content);

    inner.appendChild(msg);
    assistantContent = content;
    currentTextEl    = null;
    toolCards        = {};
    scrollBottom();
  }

  function getOrCreateTextEl() {
    if (!currentTextEl) {
      currentTextEl = document.createElement('div');
      currentTextEl.className = 'assistant-text';
      assistantContent.appendChild(currentTextEl);
    }
    return currentTextEl;
  }

  function appendText(chunk) {
    const el = getOrCreateTextEl();
    // Append raw text, render markdown on the full accumulated text
    el.dataset.raw = (el.dataset.raw || '') + chunk;
    el.innerHTML = renderMarkdown(el.dataset.raw);
    scrollBottom();
  }

  // ── History sidebar ──────────────────────────────────────────────────────

  async function loadHistory() {
    try {
      const res  = await fetch('/sessions');
      const list = await res.json();
      const container = document.getElementById('history-list');
      container.innerHTML = '<div class="history-label">Recent</div>';
      for (const s of list) {
        const btn = document.createElement('button');
        btn.className = 'history-item' + (s.session_id === sessionId ? ' active' : '');
        btn.textContent = s.title || 'Untitled';
        btn.title = s.title;
        btn.dataset.sid = s.session_id;
        btn.onclick = () => loadSession(s.session_id);
        container.appendChild(btn);
      }
    } catch (e) {
      console.warn('Could not load history', e);
    }
  }

  async function loadSession(id) {
    if (isLoading) return;
    sessionId = id;

    document.querySelectorAll('.history-item').forEach(el => {
      el.classList.toggle('active', el.dataset.sid === id);
    });

    const res  = await fetch(`/sessions/${id}/messages`);
    const data = await res.json();
    const inner = document.getElementById('messages-inner');
    inner.innerHTML = '';

    assistantContent = null;
    currentTextEl    = null;
    toolCards        = {};

    for (const msg of (data.messages || [])) {
      if (msg.role === 'user') {
        if (typeof msg.content === 'string') addUserMessage(msg.content);
      } else if (msg.role === 'assistant') {
        addAssistantMessage();
        if (Array.isArray(msg.content)) {
          for (const block of msg.content) {
            if (block.type === 'text') {
              appendText(block.text);
            } else if (block.type === 'tool_use') {
              addHistoricToolCard(block.id, block.name, block.input);
            }
          }
        }
      }
    }
    scrollBottom();
  }

  function addHistoricToolCard(id, name, input) {
    currentTextEl = null;
    const card = document.createElement('div');
    card.className = 'tool-card';
    card.dataset.id = id;
    card.innerHTML = `
      <div class="tool-header" onclick="toggleCard(this.parentElement)">
        <div class="tool-header-left">
          <span class="tool-badge">${name}</span>
          <span class="tool-status" style="font-size:12px;color:var(--text-muted)">done</span>
        </div>
        <span class="tool-toggle">▾</span>
      </div>
      <div class="tool-body">
        <div class="tool-section">
          <div class="tool-section-label">Input</div>
          <div class="tool-code">${JSON.stringify(input, null, 2)}</div>
        </div>
      </div>`;
    assistantContent.appendChild(card);
    toolCards[id] = card;
  }

  // ── Tool cards ───────────────────────────────────────────────────────────

  function addToolCard(id, name) {
    // Close current text el so next text starts fresh after this card
    currentTextEl = null;

    const card = document.createElement('div');
    card.className = 'tool-card open';
    card.dataset.id = id;
    card.innerHTML = `
      <div class="tool-header" onclick="toggleCard(this.parentElement)">
        <div class="tool-header-left">
          <span class="tool-badge">${name}</span>
          <span class="tool-status">
            <span class="tool-loading"><span></span><span></span><span></span></span>
          </span>
        </div>
        <span class="tool-toggle">▾</span>
      </div>
      <div class="tool-body">
        <div class="tool-section" id="card-input-${id}" style="display:none">
          <div class="tool-section-label">Input</div>
          <div class="tool-code" id="card-input-code-${id}"></div>
        </div>
        <div class="tool-section" id="card-result-${id}" style="display:none">
          <div class="tool-section-label">Result</div>
          <div class="tool-code" id="card-result-code-${id}"></div>
        </div>
      </div>`;

    assistantContent.appendChild(card);
    toolCards[id] = card;
    scrollBottom();
  }

  function updateToolInput(id, input) {
    const inputSection = document.getElementById(`card-input-${id}`);
    const inputCode    = document.getElementById(`card-input-code-${id}`);
    if (!inputSection || !inputCode) return;
    inputCode.textContent = JSON.stringify(input, null, 2);
    inputSection.style.display = 'block';
  }

  function updateToolResult(id, name, result) {
    const card         = toolCards[id];
    const resultSection = document.getElementById(`card-result-${id}`);
    const resultCode   = document.getElementById(`card-result-code-${id}`);
    if (!card || !resultSection || !resultCode) return;

    resultCode.textContent = result;
    resultSection.style.display = 'block';

    // Update status dot to checkmark
    const status = card.querySelector('.tool-status');
    if (status) status.innerHTML = '<span style="color: var(--text-muted); font-size:12px">done</span>';

    // Reset text node for any text that follows
    currentTextEl = null;
    scrollBottom();
  }

  function toggleCard(card) {
    card.classList.toggle('open');
  }

  // ── Send ─────────────────────────────────────────────────────────────────

  async function send(text) {
    if (!text.trim() || isLoading) return;

    hideStarters();
    setLoading(true);
    addUserMessage(text);
    addAssistantMessage();

    try {
      const response = await fetch('/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (!response.ok) {
        appendText('Error: server returned ' + response.status);
        setLoading(false);
        return;
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }

          switch (event.type) {
            case 'text':
              appendText(event.content);
              break;
            case 'tool_start':
              addToolCard(event.id, event.name);
              break;
            case 'tool_input':
              updateToolInput(event.id, event.input);
              break;
            case 'tool_result':
              updateToolResult(event.id, event.name, event.result);
              break;
            case 'error':
              appendText('\n\nError: ' + event.message);
              break;
            case 'done':
              break;
          }
        }
      }
    } catch (err) {
      appendText('\n\nNetwork error: ' + err.message);
    }

    setLoading(false);
    loadHistory();
  }

  function handleSend() {
    const input = document.getElementById('input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    send(text);
  }

  function submitStarter(q) {
    send(q);
  }

  function newChat() {
    sessionId = crypto.randomUUID();
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
    const inner = document.getElementById('messages-inner');
    inner.innerHTML = `
      <div class="starters" id="starters">
        <h2>Flow-of-Funds Analysis</h2>
        <p>Ask anything about the synthetic Q4 2025 banking data.</p>
        <div class="starter-grid">
          <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="What tables are available and what do they contain?">
            <span class="starter-icon">🗂</span>What tables are available and what do they contain?
          </button>
          <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="Give me a full Q4 2025 flow-of-funds summary broken down by segment.">
            <span class="starter-icon">📊</span>Give me a Q4 2025 flow-of-funds summary by segment.
          </button>
          <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="Which external banks received the most outflow transfers in Q4? Include return rates.">
            <span class="starter-icon">🏦</span>Which external banks received the most outflow transfers?
          </button>
          <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="Show me the weekly net flow trend for RETAIL accounts from October through December 2025.">
            <span class="starter-icon">📈</span>Weekly net flow trend for RETAIL accounts.
          </button>
          <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="What Spark pipeline produces the daily_aggregates table? Show me the lineage.">
            <span class="starter-icon">⚙️</span>What pipeline produces the daily_aggregates table?
          </button>
          <button class="starter-card" onclick="submitStarter(this.dataset.q)" data-q="Write a query showing the top 5 accounts by total debit volume in November 2025.">
            <span class="starter-icon">💳</span>Top accounts by debit volume in November 2025.
          </button>
        </div>
      </div>`;
    assistantContent = null;
    currentTextEl    = null;
    toolCards        = {};
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  loadHistory();

  // ── Input auto-resize + keyboard ─────────────────────────────────────────

  const inputEl = document.getElementById('input');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
</script>
</body>
</html>
